<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Omar Mohamed | Motion Designer & Developer</title>

    <link rel="icon" href="images/icon.png" type="image/png" />

    <!-- Primary Meta Tags for SEO & Social Sharing -->
    <meta name="description" content="Co-Founder @ Meraki Studios | Motion Designer & Java Developer — A cinematic portfolio experience." />

    <!-- Open Graph / Facebook / Discord -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://omardotcontent.github.io/" />
    <meta property="og:title" content="Omar Mohamed | Motion Designer & Developer" />
    <meta property="og:description" content="Co-Founder @ Meraki Studios | Motion Designer & Java Developer" />
    <meta property="og:image" content="https://omardotcontent.github.io/images/omarpic.webp" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://omardotcontent.github.io/" />
    <meta property="twitter:title" content="Omar Mohamed | Motion Designer & Developer" />
    <meta property="twitter:description" content="Co-Founder @ Meraki Studios | Motion Designer & Java Developer" />
    <meta property="twitter:image" content="https://omardotcontent.github.io/images/omarpic.webp" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&display=swap" rel="stylesheet" />
    <script src="https://kit.fontawesome.com/c71afe14f5.js" crossorigin="anonymous"></script>

    <!-- Styles -->
    <link rel="stylesheet" href="styles/cinema.css" />
  </head>
  <body>
    <!-- WebGL Liquid Gradient Background -->
    <canvas id="gradient-canvas"></canvas>

    <!-- Scroll hint -->
    <div class="scroll-hint" id="scroll-hint">
      <div class="scroll-hint-arrow"></div>
      <span>SCROLL</span>
    </div>

    <!-- Cinematic Scenes -->
    <main id="cinema">

      <!-- Scene 1: Hero -->
      <section class="scene scene--hero" data-scene="hero">
        <div class="scene__content" id="hero-content">
          <!-- Built by kinetic-scenes.js -->
        </div>
      </section>

      <!-- Scene 2: Meraki Studios -->
      <section class="scene scene--meraki" data-scene="meraki">
        <div class="scene__content" id="meraki-content">
          <!-- Built by kinetic-scenes.js -->
        </div>
      </section>

      <!-- Scene 3: Skills & Tools -->
      <section class="scene scene--skills" data-scene="skills">
        <div class="scene__content" id="skills-content">
          <!-- Built by kinetic-scenes.js -->
        </div>
      </section>

      <!-- Scene 4: Projects -->
      <section class="scene scene--projects" data-scene="projects">
        <div class="scene__content" id="projects-content">
          <!-- Built by kinetic-scenes.js -->
        </div>
      </section>

      <!-- Scene 5: Experience & Education -->
      <section class="scene scene--experience" data-scene="experience">
        <div class="scene__content" id="experience-content">
          <!-- Built by kinetic-scenes.js -->
        </div>
      </section>

      <!-- Scene 6: Contact / Outro -->
      <section class="scene scene--contact" data-scene="contact">
        <div class="scene__content" id="contact-content">
          <!-- Built by kinetic-scenes.js -->
        </div>
      </section>

    </main>

    <!-- Scripts -->
    <script src="scripts/portfolio-config.js"></script>
    <script src="scripts/gradient-shader.js"></script>
    <script src="scripts/scroll-engine.js"></script>
    <script src="scripts/kinetic-scenes.js"></script>
  </body>
</html>
